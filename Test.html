<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
<style>
body{background:#0b0b18;color:#ffcb05;font-family:sans-serif;text-align:center;padding:40px;}
button{font-size:20px;padding:20px 40px;background:#e3350d;color:#fff;border:none;border-radius:10px;cursor:pointer;margin:10px;}
#result{font-size:24px;margin-top:30px;color:#7AC74C;}
</style>
</head>
<body>
<h1>JS TEST</h1>
<p>Tap the button. If JS works you will see a message.</p>
<button onclick="testClick()">TAP ME</button>
<div id="result"></div>
<script>
function testClick() {
  document.getElementById('result').textContent = 'JS IS WORKING!';
}
</script>
</body>
</html>
